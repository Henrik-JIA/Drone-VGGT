[project]
name = "drone-map-anything"
version = "1.0.0"
description = "Universal Feed-Forward Metric 3D Reconstruction with Drone Mapping"
authors = ["Your Name <your.email@example.com>"]
# 使用清华镜像源（国内访问更稳定）
channels = [
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/pytorch/",
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/nvidia/",
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge/"
]
platforms = ["win-64", "linux-64"]

# 系统要求 - 匹配你的 CUDA 11.8 环境
[system-requirements]
cuda = "11.8"

# ========== Conda 依赖 ==========
[dependencies]
# Python 版本
python = ">=3.10,<3.12"

# PyTorch 生态 - 匹配 torch 2.3.1+cu118
pytorch = "==2.3.1"
torchvision = "==0.18.1"
torchaudio = "==2.3.1"
pytorch-cuda = "==11.8"

# 科学计算
numpy = "1.26.*"
scipy = ">=1.15"
scikit-image = ">=0.25"
scikit-learn = ">=1.7"

# 点云和 3D 处理
open3d = ">=0.19"

# 图像处理
opencv = ">=4.8"
pillow = ">=11.0"

# 可视化
matplotlib = ">=3.10"

# 数据处理
pandas = ">=2.3"
tqdm = ">=4.67"

# 其他工具
einops = ">=0.8"
safetensors = ">=0.6"
huggingface_hub = ">=0.35"

# 地理空间
gdal = ">=3.8"
rasterio = ">=1.4"
pyproj = ">=3.7"
shapely = ">=2.1"

# 构建工具
pip = ">=25.0"

# ========== PyPI 依赖 ==========
[pypi-dependencies]
# MapAnything 核心依赖
hydra-core = ">=1.3"
natsort = ">=8.4"
orjson = ">=3.11"
pillow-heif = ">=1.1"
plyfile = ">=1.1"
python-box = ">=7.3"
requests = ">=2.32"
rerun-sdk = "~=0.24.1"
tensorboard = ">=2.20"
trimesh = ">=4.8"
uniception = "==0.1.6"

# COLMAP 相关 - 匹配你的版本
pycolmap = "==3.11.0"
pyceres = "==2.4"

# 深度学习工具
kornia = ">=0.8"
timm = ">=1.0"

# 可视化
viser = ">=0.2"
plotly = ">=6.5"

# GPS 和坐标转换
pymap3d = ">=3.2"

# LAS 文件支持
laspy = ">=2.6"

# 网格处理
pymeshlab = ">=2025.7"

# Gradio 界面
gradio = ">=5.17"
spaces = ">=0.42"

# 开发工具
ruff = ">=0.14"

# ========== 任务定义 ==========
[tasks]
# 安装本地包（editable 模式）
install = "pip install -e . --no-deps"

# 安装 LightGlue
install-lightglue = "pip install git+https://github.com/cvg/LightGlue.git --no-deps"

# 安装第三方子模块
install-vggt = "pip install -e third/vggt --no-deps"
install-fastvggt = "pip install -e third/fastvggt --no-deps"

# 完整安装
setup = { depends-on = ["install", "install-lightglue", "install-vggt", "install-fastvggt"] }

# 运行增量 SfM
run-sfm = "python SfM/incremental_feature_matcher.py"

# 运行 Delaunay 网格化
run-mesh = "python SfM/delaunay/delaunay_mesh.py"

# 生成 DSM
run-dsm = "python SfM/delaunay/ply_to_dsm.py"

# 代码格式检查
lint = "ruff check ."
format = "ruff format ."

# 显示环境信息
info = "python -c \"import torch; print(f'PyTorch: {torch.__version__}'); print(f'CUDA: {torch.cuda.is_available()}'); print(f'Device: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"CPU\"}')\""

# ========== 特性环境 ==========
[feature.dev.pypi-dependencies]
pre-commit = ">=3.6"
pytest = ">=7.4"
pytest-cov = ">=4.1"

[feature.minimal.dependencies]
# 最小环境，不含 gradio 等大型依赖
python = ">=3.10,<3.12"
pytorch = "==2.3.1"
torchvision = "==0.18.1"
pytorch-cuda = "==11.8"
numpy = "1.26.*"

# ========== 环境定义 ==========
[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
minimal = { features = ["minimal"], solve-group = "minimal" }

