[project]
name = "drone-map-anything"
version = "1.0.0"
description = "Universal Feed-Forward Metric 3D Reconstruction with Drone Mapping"
authors = ["Your Name <your.email@example.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "linux-aarch64", "osx-arm64"]

# 系统要求 - 匹配你的 CUDA 11.8 环境
[system-requirements]
cuda = "11.8"

# ========== 通用 Conda 依赖 ==========
[dependencies]
# Python 版本
python = "3.10.*"

# 科学计算
numpy = ">=1.26,<2"
scipy = ">=1.11"
scikit-image = ">=0.21"
scikit-learn = ">=1.3"

# 点云和 3D 处理
open3d = ">=0.17"

# 图像处理
opencv = ">=4.8"
pillow = ">=10.0"

# 可视化
matplotlib = ">=3.8"

# 数据处理
pandas = ">=2.0"
tqdm = ">=4.65"

# 其他工具
einops = ">=0.7"
safetensors = ">=0.4"
huggingface_hub = ">=0.20"

# 地理空间
gdal = ">=3.8"
rasterio = ">=1.3"
pyproj = ">=3.6"
shapely = ">=2.0"

# 构建工具
pip = ">=23.0"

# ========== 平台特定 Conda 依赖 ==========
[target.linux-64.dependencies]
cuda-version = "==11.8"

[target.win-64.dependencies]
cuda-version = "==11.8"

# ========== 通用 PyPI 依赖 ==========
[pypi-dependencies]
# MapAnything 核心依赖
hydra-core = ">=1.3"
natsort = ">=8.4"
orjson = ">=3.9"
pillow-heif = ">=0.13"
plyfile = ">=1.0"
python-box = ">=7.1"
requests = ">=2.31"
rerun-sdk = ">=0.15"
tensorboard = ">=2.15"
trimesh = ">=4.0"
uniception = "==0.1.6"

# COLMAP 相关
pycolmap = ">=0.6"
pyceres = ">=2.1"

# 深度学习工具
kornia = ">=0.7"
timm = ">=0.9"

# 可视化
viser = ">=0.1"
plotly = ">=5.18"

# GPS 和坐标转换
pymap3d = ">=3.0"

# LAS 文件支持
laspy = ">=2.5"

# 网格处理
pymeshlab = ">=2023.12"

# Gradio 界面
gradio = ">=4.0"
spaces = ">=0.19"

# 开发工具
ruff = ">=0.1"

# ========== 平台特定 PyPI 依赖 ==========
# Linux x86_64
[target.linux-64.pypi-dependencies]
torch = { version = "==2.3.1", index = "https://download.pytorch.org/whl/cu118" }
torchvision = { version = "==0.18.1", index = "https://download.pytorch.org/whl/cu118" }
torchaudio = { version = "==2.3.1", index = "https://download.pytorch.org/whl/cu118" }

# Windows x86_64
[target.win-64.pypi-dependencies]
torch = { version = "==2.3.1", index = "https://download.pytorch.org/whl/cu118" }
torchvision = { version = "==0.18.1", index = "https://download.pytorch.org/whl/cu118" }
torchaudio = { version = "==2.3.1", index = "https://download.pytorch.org/whl/cu118" }

# Linux ARM64 (Jetson 等)
[target.linux-aarch64.pypi-dependencies]
torch = ">=2.0"
torchvision = ">=0.15"
torchaudio = ">=2.0"

# macOS ARM64 (Apple Silicon)
[target.osx-arm64.pypi-dependencies]
torch = ">=2.0"
torchvision = ">=0.15"
torchaudio = ">=2.0"

# ========== 任务定义 ==========
[tasks]
# 安装本地包（editable 模式）
install = "pip install -e . --no-deps"

# 安装 LightGlue
install-lightglue = "pip install git+https://github.com/cvg/LightGlue.git --no-deps"

# 安装第三方子模块
install-vggt = "pip install -e third/vggt --no-deps"
install-fastvggt = "pip install -e third/fastvggt --no-deps"

# 完整安装
setup = { depends-on = ["install", "install-lightglue", "install-vggt", "install-fastvggt"] }

# 运行增量 SfM
run-sfm = "python SfM/incremental_feature_matcher.py"

# 运行 Delaunay 网格化
run-mesh = "python SfM/delaunay/delaunay_mesh.py"

# 生成 DSM
run-dsm = "python SfM/delaunay/ply_to_dsm.py"

# 代码格式检查
lint = "ruff check ."
format = "ruff format ."

# 显示环境信息
info = "python -c \"import torch; print(f'PyTorch: {torch.__version__}'); print(f'CUDA: {torch.cuda.is_available()}'); print(f'Device: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"CPU\"}')\""

# ========== 特性环境 ==========
[feature.dev.pypi-dependencies]
pre-commit = ">=3.6"
pytest = ">=7.4"
pytest-cov = ">=4.1"

# ========== 环境定义 ==========
[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
